<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재무비교분석기</title>
<style>
  :root {
    --bg: #F5F6F8; --surface: #FFFFFF; --ink: #1A222D; --ink-soft: #4B5563; --muted: #6B7280;
    --border: rgba(26,34,45,0.12); --accent: #1F5C6B; --accent-soft: rgba(31,92,107,0.10); --gold: #A8791F;
    --shadow: 0 1px 2px rgba(20,26,34,0.04), 0 8px 24px -12px rgba(20,26,34,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#10141A; --surface:#171D25; --ink:#E7EAEE; --ink-soft:#B7BFC9; --muted:#8B95A3;
      --border: rgba(231,234,238,0.12); --accent:#5FB8C9; --accent-soft: rgba(95,184,201,0.14); --gold:#D9A94A;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px -12px rgba(0,0,0,0.5); }
  }
  :root[data-theme="dark"] { --bg:#10141A; --surface:#171D25; --ink:#E7EAEE; --ink-soft:#B7BFC9; --muted:#8B95A3;
    --border: rgba(231,234,238,0.12); --accent:#5FB8C9; --accent-soft: rgba(95,184,201,0.14); --gold:#D9A94A;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px -12px rgba(0,0,0,0.5); }
  :root[data-theme="light"] { --bg:#F5F6F8; --surface:#FFFFFF; --ink:#1A222D; --ink-soft:#4B5563; --muted:#6B7280;
    --border: rgba(26,34,45,0.12); --accent:#1F5C6B; --accent-soft: rgba(31,92,107,0.10); --gold:#A8791F;
    --shadow: 0 1px 2px rgba(20,26,34,0.04), 0 8px 24px -12px rgba(20,26,34,0.12); }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 32px 20px;
  }
  .card-wrap { max-width: 640px; width: 100%; }
  .eyebrow { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11.5px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
  h1 { font-size: 26px; margin: 0 0 8px; letter-spacing: -0.01em; }
  p.lead { color: var(--ink-soft); font-size: 14.5px; margin: 0 0 28px; max-width: 52ch; }
  .links { display: grid; gap: 12px; }
  a.link-card {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface); text-decoration: none; color: var(--ink);
    box-shadow: var(--shadow); transition: border-color 0.15s ease, transform 0.15s ease;
  }
  a.link-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  a.link-card .icon { font-size: 22px; flex: none; }
  a.link-card .name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  a.link-card .desc { font-size: 12.5px; color: var(--muted); }
  footer { margin-top: 26px; font-size: 11.5px; color: var(--muted); }
  footer a { color: var(--accent); }
</style>
</head>
<body>
  <div class="card-wrap">
    <div class="eyebrow">DART Open API</div>
    <h1>재무비교분석기</h1>
    <p class="lead">국내 상장기업 재무제표를 회사명으로 비교하는 인터랙티브 대시보드와, 이를 제품으로 확장하기 위한 요구사항 정의서입니다.</p>
    <div class="links">
      <a class="link-card" href="./financial_dashboard.html">
        <span class="icon">📊</span>
        <span>
          <div class="name">재무비교분석기 대시보드</div>
          <div class="desc">회사 검색·선택, 추이 차트, 비율 비교, 분리과세 대상 판정</div>
        </span>
      </a>
      <a class="link-card" href="./financial_analyzer_prd.html">
        <span class="icon">📋</span>
        <span>
          <div class="name">제품 요구사항 정의서 (PRD)</div>
          <div class="desc">웹 서비스로 발전시키기 위한 기능·아키텍처·로드맵</div>
        </span>
      </a>
    </div>
    <footer>소스: <a href="https://github.com/jihankim61/financial-comparison-analyzer">github.com/jihankim61/financial-comparison-analyzer</a></footer>
  </div>
</body>
</html>
